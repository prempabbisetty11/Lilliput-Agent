<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lilliput Agent — AI Workspace</title>
  <meta name="description" content="Lilliput Agent is a modern AI workspace with chat and voice features." />
  <link rel="preconnect" href="https://lilliput-agent.onrender.com" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-dark">
  <div class="single-chat-app">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Lilliput Chat</h1>
        <span class="workspace-tag">Lilliput Agent</span>
      </div>
    </header>

    <main class="single-workspace">
      <div class="chat-panel">
        <div class="chat-header">
          <div class="chat-title">
            <strong>New Conversation</strong>
            <span class="status">Online</span>
          </div>
        </div>

        <!-- Messages -->
        <div id="chat" class="chat-body chat-stream">
          <!-- Messages injected by script.js -->
        </div>

        <!-- Composer -->
        <div class="chat-composer">
          <div class="input-wrap">
            <input
              id="msg"
              type="text"
              placeholder="Type your message…"
              autocomplete="off"
            />
          </div>
          <div class="composer-actions">
            <button class="btn secondary" id="voiceBtn" onclick="startVoice()" title="Speak">🎤</button>
            <button class="btn secondary" id="muteBtn" onclick="toggleMute()" title="Mute / Unmute">🔊</button>
            <button class="btn primary" id="sendBtn" onclick="send()">Send</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <span>© 2026 Prem Pabbisetty</span>
    </footer>
  </div>

  <!-- App Script -->
  <script src="script.js"></script>
  <script>
    // --- Simple Chat History (localStorage) ---
    const CHAT_KEY = "lilliput_chat_history_v1";
    const chatHistoryEl = document.getElementById("chat");

    // Restore history on load
    document.addEventListener("DOMContentLoaded", () => {
      try {
        const saved = localStorage.getItem(CHAT_KEY);
        if (saved && chatHistoryEl) {
          chatHistoryEl.innerHTML = saved;
          // Scroll to bottom after restore
          chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
        }
      } catch (e) {
        console.warn("Could not restore chat history", e);
      }
    });

    // Observe changes to chat and persist
    if (chatHistoryEl) {
      const observer = new MutationObserver(() => {
        try {
          localStorage.setItem(CHAT_KEY, chatHistoryEl.innerHTML);
        } catch (e) {
          console.warn("Could not save chat history", e);
        }
      });

      observer.observe(chatHistoryEl, { childList: true, subtree: true, characterData: true });
    }
  </script>
</body>
</html>
